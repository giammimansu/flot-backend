AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Flot Backend — Real-time taxi-pooling serverless API.
  Sprint 1: Foundation (DynamoDB, Cognito, User CRUD, Photo Upload, REST API)

# ─────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    MemorySize: 256
    Timeout: 10
    Tracing: Active
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        TABLE_NAME: !Ref FlotTable
        MEDIA_BUCKET: !Ref MediaBucket
        STAGE: !Ref Stage
        FAKE_DOOR_MODE: !Ref FakeDoorMode
        POWERTOOLS_SERVICE_NAME: flot-backend
        POWERTOOLS_METRICS_NAMESPACE: Flot
        LOG_LEVEL: INFO
        SES_FROM_EMAIL: !Ref SesFromEmail
        MATCH_NOTIFICATION_TEMPLATE: !Ref MatchNotificationTemplate
        FIREBASE_CREDENTIALS_SECRET_ARN: !Ref FirebaseCredentialsSecretArn

# ─────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  FakeDoorMode:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  GoogleClientId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /flot/dev/google-client-id
    NoEcho: true

  GoogleClientSecret:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /flot/dev/google-client-secret
    NoEcho: true

  SesFromEmail:
    Type: String
    Default: noreply@flot.app

  MatchNotificationTemplate:
    Type: String
    Default: match_found

  FirebaseCredentialsSecretArn:
    Type: String
    Default: "*"
    Description: ARN of the Secrets Manager secret containing the Firebase service account JSON

# ─────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────

Conditions:
  IsDev: !Equals [!Ref Stage, dev]

# ─────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────

Resources:

  # ── SNS ────────────────────────────────────────────────────────────

  PushNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "flot-push-${Stage}"

  # ── EventBridge ────────────────────────────────────────────────────

  FlotEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: flot-events

  # ── Shared Lambda Layer ────────────────────────────────────────────

  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub flot-shared-${Stage}
      Description: Shared dependencies (Powertools, Pydantic, Stripe, Pillow)
      ContentUri: src/layers/shared/
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - arm64
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.13
      BuildArchitecture: arm64

  # ── DynamoDB Single-Table ──────────────────────────────────────────

  FlotTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub Flot-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        # GSI1: Matching (airport+timeBucket -> old and new keys)
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        # GSI2: User trips (userId → createdAt)
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        # GSI3: User connections (userId → connId)
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
        # GSI4: Stripe intent lookup
        - AttributeName: gsi4pk
          AttributeType: S
        # GSI5: Scheduled matching (airportCode#status -> flightTime)
        - AttributeName: gsi5pk
          AttributeType: S
        - AttributeName: gsi5sk
          AttributeType: S
        # GSI6: TentativeMatch lock window (airportCode#tentative -> lockAt)
        - AttributeName: gsi6pk
          AttributeType: S
        - AttributeName: lockAt
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1-TimeBucket: airportCode#timeBucket → destZone (OLD - TO BE DELETED)
        - IndexName: GSI1-TimeBucket
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI1-TimeBucket-v2: airportCode#timeBucket → createdAt (NEW)
        - IndexName: GSI1-TimeBucket-v2
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI2-UserTrips: userId → createdAt
        - IndexName: GSI2-UserTrips
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI3-UserConn: userId → connId
        - IndexName: GSI3-UserConn
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
        # GSI4-StripeIntent: stripePaymentIntentId (pk only)
        - IndexName: GSI4-StripeIntent
          KeySchema:
            - AttributeName: gsi4pk
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        
        # GSI5-TripStatus: airportCode#status → flightTime
        - IndexName: GSI5-TripStatus
          KeySchema:
            - AttributeName: gsi5pk
              KeyType: HASH
            - AttributeName: gsi5sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI6-TentativeMatch: airportCode#tentative → lockAt
        - IndexName: GSI6-TentativeMatch
          KeySchema:
            - AttributeName: gsi6pk
              KeyType: HASH
            - AttributeName: lockAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: flot
        - Key: Environment
          Value: !Ref Stage

  # ── Cognito User Pool ──────────────────────────────────────────────

  FlotUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub flot-users-${Stage}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
        - Name: picture
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
        PostAuthentication: !GetAtt PostConfirmationFunction.Arn
      UserPoolTags:
        Project: flot
        Environment: !Ref Stage

  # Permission for Cognito to invoke PostConfirmation Lambda
  PostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt FlotUserPool.Arn

  # Google Identity Provider
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref FlotUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name
        picture: picture
        username: sub

  # User Pool Client
  FlotUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - GoogleIdentityProvider
    Properties:
      ClientName: !Sub flot-web-${Stage}
      UserPoolId: !Ref FlotUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - Google
      CallbackURLs:
        - http://localhost:3000/auth/callback
        - http://localhost:3001/auth/callback
        - !Sub https://app.flot.it/auth/callback
        - https://www.flot-app.com/auth/callback
        - https://d8o5e1c1cqrgw.cloudfront.net/auth/callback
        - https://oauth.pstmn.io/v1/browser-callback
      LogoutURLs:
        - http://localhost:3000
        - http://localhost:3001
        - https://app.flot.it
        - https://www.flot-app.com
        - https://d8o5e1c1cqrgw.cloudfront.net
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  # Cognito Domain (Hosted UI)
  FlotUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub flot-auth-${Stage}
      UserPoolId: !Ref FlotUserPool

  # ── S3 Media Bucket ────────────────────────────────────────────────

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub flot-media-${Stage}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
            AllowedOrigins:
              - http://localhost:3000
              - http://localhost:3001
              - https://app.flot.it
              - https://www.flot.it
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTempFiles
            Prefix: temp/
            Status: Enabled
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: flot

  # S3 Bucket Policy for CloudFront OAC
  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${MediaBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${MediaCDN}

  # ── CloudFront CDN ─────────────────────────────────────────────────

  MediaCDNOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub flot-media-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3MediaOrigin
            DomainName: !GetAtt MediaBucket.RegionalDomainName
            OriginAccessControlId: !Ref MediaCDNOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: S3MediaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
        HttpVersion: http2and3
        Comment: !Sub Flot Media CDN (${Stage})
      Tags:
        - Key: Project
          Value: flot

  # ── REST API Gateway ───────────────────────────────────────────────

  FlotApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub flot-api-${Stage}
      StageName: !Ref Stage
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'86400'"
      Auth:
        DefaultAuthorizer: FlotCognitoAuthorizer
        Authorizers:
          FlotCognitoAuthorizer:
            UserPoolArn: !GetAtt FlotUserPool.Arn
        AddDefaultAuthorizerToCorsPreflight: false

  # ── Lambda Functions ───────────────────────────────────────────────

  # Auth: PostConfirmation (Cognito trigger)
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-post-confirmation-${Stage}
      Handler: handlers.auth.post_confirmation.handler
      CodeUri: src/
      Description: Cognito PostConfirmation — creates user profile in DynamoDB
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable

  # Airports: List (public)
  ListAirportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-list-airports-${Stage}
      Handler: handlers.airports.list_airports.handler
      CodeUri: src/
      Description: GET /airports — list all active airports
      Events:
        ListAirports:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /airports
            Method: GET
            Auth:
              Authorizer: NONE

  # Airports: Get (public)
  GetAirportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-airport-${Stage}
      Handler: handlers.airports.get_airport.handler
      CodeUri: src/
      Description: GET /airports/{code} — get single airport config
      Events:
        GetAirport:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /airports/{code}
            Method: GET
            Auth:
              Authorizer: NONE

  # Users: Get Profile (auth required)
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-profile-${Stage}
      Handler: handlers.users.get_profile.handler
      CodeUri: src/
      Description: GET /users/me — get current user profile
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /users/me
            Method: GET

  GetUserPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-user-public-${Stage}
      Handler: handlers.users.get_user_public.handler
      CodeUri: src/
      Description: GET /users/{userId} — public profile (match partners only)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetUserPublic:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /users/{userId}
            Method: GET

  # Users: Register Push Token (auth required)
  RegisterPushTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-register-push-token-${Stage}
      Handler: handlers.users.register_push_token.handler
      CodeUri: src/
      Description: PUT /users/me/push-token — register push token
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
      Events:
        RegisterPushToken:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /users/me/push-token
            Method: PUT

  # Users: Update Profile (auth required)
  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-update-profile-${Stage}
      Handler: handlers.users.update_profile.handler
      CodeUri: src/
      Description: PUT /users/me — update user profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /users/me
            Method: PUT

  # Users: Get Photo Upload URL (auth required)
  GetPhotoUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-photo-upload-url-${Stage}
      Handler: handlers.users.get_photo_upload_url.handler
      CodeUri: src/
      Description: PUT /users/me/photo — get presigned S3 upload URL
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        GetPhotoUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /users/me/photo
            Method: PUT

  # Users: Process Photo (S3 trigger — notification configured via post-deploy script)
  ProcessPhotoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-process-photo-${Stage}
      Handler: handlers.users.process_photo.handler
      CodeUri: src/
      Description: S3 trigger — resize, thumbnail, blur uploaded photos
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          CDN_DOMAIN: !GetAtt MediaCDN.DomainName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable

  # Permission for S3 to invoke ProcessPhoto
  ProcessPhotoInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProcessPhotoFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt MediaBucket.Arn
      SourceAccount: !Ref AWS::AccountId

  # ── Notifications ──────────────────────────────────────────────────
  GetNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-notifications-${Stage}
      Handler: handlers.notifications.get_notifications.handler
      CodeUri: src/
      Description: GET /notifications — list user notifications
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetNotifications:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /notifications
            Method: GET

  # ── Trips ──────────────────────────────────────────────────────────
  MyTripsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-my-trips-${Stage}
      Handler: handlers.trips.my_trips.handler
      CodeUri: src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        MyTrips:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips/my
            Method: GET

  CancelTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-cancel-trip-${Stage}
      Handler: handlers.trips.cancel_trip.handler
      CodeUri: src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        CancelTrip:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips/{tripId}
            Method: DELETE
  CreateTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-create-trip-${Stage}
      Handler: handlers.trips.create_trip.handler
      CodeUri: src/
      Description: POST /trips — create a new trip
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        CreateTrip:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips
            Method: POST

  GetTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-trip-${Stage}
      Handler: handlers.trips.get_trip.handler
      CodeUri: src/
      Description: GET /trips/{tripId} — retrieve trip details
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetTrip:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips/{tripId}
            Method: GET

  SearchTripsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-search-trips-${Stage}
      Handler: handlers.trips.search_trips.handler
      CodeUri: src/
      Description: POST /trips/search — search for matching trips
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        SearchTrips:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips/search
            Method: POST

  UnlockMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-unlock-match-${Stage}
      Handler: handlers.matches.unlock_match.handler
      CodeUri: src/
      Description: POST /trips/{tripId}/unlock — unlock a match
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !If [IsDev, "", !Sub "{{resolve:ssm:/flot/${Stage}/stripe-secret-key}}"]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
        - Statement:
            Effect: Allow
            Action: scheduler:CreateSchedule
            Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/unlock-*"
        - Statement:
            Effect: Allow
            Action: scheduler:DeleteSchedule
            Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/unlock-*"
        - Statement:
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt SchedulerInvokeLambdaRole.Arn
      Events:
        UnlockMatch:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /trips/{tripId}/unlock
            Method: POST

  GetMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-match-${Stage}
      Handler: handlers.matches.get_match.handler
      CodeUri: src/
      Description: GET /matches/{matchId} — retrieve match details
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetMatch:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /matches/{matchId}
            Method: GET

  GetChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-get-chat-${Stage}
      Handler: handlers.matches.get_chat.handler
      CodeUri: src/
      Description: GET /matches/{matchId}/chat — paginated chat history
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
      Events:
        GetChat:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /matches/{matchId}/chat
            Method: GET

  DeclineMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-decline-match-${Stage}
      Handler: handlers.matches.decline_match.handler
      CodeUri: src/
      Description: POST /matches/{matchId}/decline — user declines a pending match
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        DeclineMatch:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /matches/{matchId}/decline
            Method: POST

  # ── Events ─────────────────────────────────────────────────────────

  OnTripCreatedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-trip-created-${Stage}
      Handler: handlers.events.on_trip_created.handler
      CodeUri: src/
      Description: EventBridge — trip.created.* — matching attempt
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        TripCreatedLive:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - trip.created.live
        TripCreatedScheduled:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - trip.created.scheduled

  OnMatchFoundFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-match-found-${Stage}
      Handler: handlers.events.on_match_found.handler
      CodeUri: src/
      Description: EventBridge — match.found — WS notification
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${FlotWsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref FirebaseCredentialsSecretArn
        - SESCrudPolicy:
            IdentityName: !Ref SesFromEmail
      Events:
        MatchFound:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - match.found

  MatchmakerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-matchmaker-${Stage}
      Handler: handlers.matching.matchmaker.handler
      CodeUri: src/
      Description: Background scheduled job for finding matches
      MemorySize: 512
      Environment:
        Variables:
          LOCK_HOURS_BEFORE: "3"
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref FirebaseCredentialsSecretArn
      Events:
        ScheduleEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(5 minutes)

  OnTripExpiredFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-trip-expired-${Stage}
      Handler: handlers.events.on_trip_expired.handler
      CodeUri: src/
      Description: EventBridge — trip.expired
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
      Events:
        TripExpired:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - trip.expired

  # ── v4 — Flight Tracker (polls every 15 min) ──────────────────────

  FlightTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-flight-tracker-${Stage}
      Handler: handlers.flights.flight_tracker.handler
      CodeUri: src/
      Description: v4 — polls flight ETAs every 15 min, emits flight.delayed
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          FLIGHT_TRACKER_PROVIDER: !If [IsDev, "mock", !Sub "{{resolve:ssm:/flot/${Stage}/flight-tracker-provider}}"]
          FLIGHT_TRACKER_API_KEY: !If [IsDev, "", !Sub "{{resolve:ssm:/flot/${Stage}/flight-tracker-key}}"]
          TRACKING_WINDOW_HOURS: "12"
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        ScheduleEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(15 minutes)
            State: ENABLED

  # ── Flight Lookup (UI autocomplete proxy) ────────────────────────

  FlightLookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-flight-lookup-${Stage}
      Handler: handlers.flights.flight_lookup.handler
      CodeUri: src/
      Description: GET /flights/lookup — AeroDataBox proxy for UI autocomplete
      Timeout: 5
      Environment:
        Variables:
          AERODATABOX_SSM_KEY: !Sub "/flot/${Stage}/aerodatabox-key"
          FLIGHT_TRACKER_PROVIDER: aerodatabox
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/flot/${Stage}/aerodatabox-key"
      Events:
        FlightLookup:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /flights/lookup
            Method: GET

  # ── Flight Search (UI autocomplete) ──────────────────────────────

  FlightSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-flight-search-${Stage}
      Handler: handlers.flights.search_flights.handler
      CodeUri: src/
      Description: GET /flights/search — autocomplete proxy for check-in UI
      MemorySize: 128
      Timeout: 3
      Environment:
        Variables:
          AERODATABOX_SSM_KEY: !Sub "/flot/${Stage}/aerodatabox-key"
          FLIGHT_TRACKER_PROVIDER: aerodatabox
      Policies:
        - Statement:
            Effect: Allow
            Action: ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/flot/${Stage}/aerodatabox-key"
      Events:
        FlightSearch:
          Type: Api
          Properties:
            RestApiId: !Ref FlotApi
            Path: /flights/search
            Method: GET

  # ── v4 — flight.delayed / flight.advanced handler ─────────────────

  OnFlightDelayedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-flight-delayed-${Stage}
      Handler: handlers.events.on_flight_delayed.handler
      CodeUri: src/
      Description: v4 — re-evaluates TentativeMatch on flight delay
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        FlightDelayed:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - flight.delayed
                - flight.advanced

  # ── v4 — match.invalidated handler ───────────────────────────────

  OnMatchInvalidatedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-match-invalidated-${Stage}
      Handler: handlers.events.on_match_invalidated.handler
      CodeUri: src/
      Description: v4 — notifies users when a confirmed match is cancelled
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref FirebaseCredentialsSecretArn
      Events:
        MatchInvalidated:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - match.invalidated

  # ── Sprint 5: Payment Deadlock Resolution ─────────────────────────

  UnlockTimeoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-unlock-timeout-${Stage}
      Handler: handlers.events.on_unlock_expired.handler
      CodeUri: src/
      Description: EventBridge Scheduler — handles unlock timeout
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
        - Statement:
            Effect: Allow
            Action: scheduler:DeleteSchedule
            Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/unlock-*"

  UnlockReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-unlock-reminder-${Stage}
      Handler: handlers.events.on_unlock_reminder.handler
      CodeUri: src/
      Description: EventBridge Scheduler — escalante reminder
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref FirebaseCredentialsSecretArn
        - SESCrudPolicy:
            IdentityName: !Ref SesFromEmail

  OnPartialUnlockFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-partial-unlock-${Stage}
      Handler: handlers.events.on_partial_unlock.handler
      CodeUri: src/
      Description: EventBridge — match.partially_unlocked
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref FirebaseCredentialsSecretArn
        - SESCrudPolicy:
            IdentityName: !Ref SesFromEmail
        - Statement:
            Effect: Allow
            Action: scheduler:CreateSchedule
            Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/unlock-*"
        - Statement:
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt SchedulerInvokeLambdaRole.Arn
      Events:
        EventBridgeRule:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - match.partially_unlocked

  OnMatchDissolvedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-match-dissolved-${Stage}
      Handler: handlers.events.on_match_dissolved.handler
      CodeUri: src/
      Description: EventBridge — match.dissolved
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
      Events:
        EventBridgeRule:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - match.dissolved

  OnMatchExpiredFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-match-expired-${Stage}
      Handler: handlers.events.on_match_expired.handler
      CodeUri: src/
      Description: EventBridge — match.expired
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
      Events:
        EventBridgeRule:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - match.expired

  OnTripCompletedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-on-trip-completed-${Stage}
      Handler: handlers.events.on_trip_completed.handler
      CodeUri: src/
      Description: EventBridge — trip.completed
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref FlotEventBus
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        EventBridgeRule:
          Type: CloudWatchEvent
          Properties:
            EventBusName: !Ref FlotEventBus
            Pattern:
              source:
                - flot-backend
              detail-type:
                - trip.completed

  MatchDissolveCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-match-dissolve-checker-${Stage}
      Handler: handlers.matching.dissolve_checker.handler
      CodeUri: src/
      Description: Scheduled job to dissolve unresponsive matches
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref FlotEventBus
      Events:
        ScheduledRule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(1 hour)"
            State: ENABLED

  SchedulerInvokeLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt UnlockTimeoutFunction.Arn
                  - !GetAtt UnlockReminderFunction.Arn

  # ── WebSocket API Gateway ──────────────────────────────────────────

  FlotWsApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub flot-ws-${Stage}
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  FlotWsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref FlotWsApi
      StageName: !Ref Stage
      AutoDeploy: true
      DefaultRouteSettings:
        DataTraceEnabled: false
        LoggingLevel: OFF
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # ── WebSocket Lambda Functions ─────────────────────────────────────

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-ws-connect-${Stage}
      Handler: handlers.websocket.connect.handler
      CodeUri: src/
      Description: WebSocket $connect — JWT validation + CONN# storage
      Environment:
        Variables:
          USER_POOL_ID: !Ref FlotUserPool
          USER_POOL_CLIENT_ID: !Ref FlotUserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-ws-disconnect-${Stage}
      Handler: handlers.websocket.disconnect.handler
      CodeUri: src/
      Description: WebSocket $disconnect — remove CONN# record
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable

  WsDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-ws-default-${Stage}
      Handler: handlers.websocket.default.handler
      CodeUri: src/
      Description: WebSocket $default — catch-all unknown actions
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${FlotWsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/${Stage}/*"

  WsChatMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-ws-chat-${Stage}
      Handler: handlers.websocket.chat_message.handler
      CodeUri: src/
      Description: WebSocket chat_message — relay real-time chat
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${FlotWsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/${Stage}/*"

  WsTypingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub flot-ws-typing-${Stage}
      Handler: handlers.websocket.typing.handler
      CodeUri: src/
      Description: WebSocket typing — relay typing indicator
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${FlotWsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FlotTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/${Stage}/*"

  # ── WebSocket Integrations ─────────────────────────────────────────

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FlotWsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations"

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FlotWsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations"

  WsDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FlotWsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations"

  WsChatMessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FlotWsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsChatMessageFunction.Arn}/invocations"

  WsTypingIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FlotWsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsTypingFunction.Arn}/invocations"

  # ── WebSocket Routes ───────────────────────────────────────────────

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FlotWsApi
      RouteKey: "$connect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsConnectIntegration}"

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FlotWsApi
      RouteKey: "$disconnect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsDisconnectIntegration}"

  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FlotWsApi
      RouteKey: "$default"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsDefaultIntegration}"

  WsChatMessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FlotWsApi
      RouteKey: "chat_message"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsChatMessageIntegration}"

  WsTypingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FlotWsApi
      RouteKey: "typing"
      AuthorizationType: NONE
      Target: !Sub "integrations/${WsTypingIntegration}"

  # ── WebSocket Lambda Permissions ───────────────────────────────────

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/*"

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/*"

  WsDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDefaultFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/*"

  WsChatMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsChatMessageFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/*"

  WsTypingPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsTypingFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlotWsApi}/*"

# ─────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: REST API Gateway URL
    Value: !Sub https://${FlotApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}

  TableName:
    Description: DynamoDB table name
    Value: !Ref FlotTable

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref FlotUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref FlotUserPoolClient

  CognitoDomain:
    Description: Cognito Hosted UI domain
    Value: !Sub https://flot-auth-${Stage}.auth.${AWS::Region}.amazoncognito.com

  MediaBucketName:
    Description: S3 media bucket name
    Value: !Ref MediaBucket

  CDNDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt MediaCDN.DomainName

  WsApiUrl:
    Description: WebSocket API endpoint
    Value: !Sub "wss://${FlotWsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub "flot-ws-endpoint-${Stage}"
